<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ลาวอ้อยต้อย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <main class="screen">

    <div class="logo-wrap">
      <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" aria-label="โลโก้ลาวอ้องท้อง">
        <polygon points="48,6 84,27 84,69 48,90 12,69 12,27" fill="#7A1A1A"/>
        <polygon points="48,16 76,32 76,64 48,80 20,64 20,32" fill="#5A0E0E"/>
        <text x="48" y="58" text-anchor="middle" font-size="32" fill="#FAF6EE">🍜</text>
      </svg>
    </div>

    <div class="brand-th">ลาวอ้อยต้อย</div>
    <div class="brand-en">E-SAN RESTAURANT</div>

    <div class="login-heading">LOGIN</div>
    <div class="login-sub">TO EAT</div>

    <form class="form" onsubmit="handleLogin(event)">
      <input
        class="input-field"
        type="text"
        id="username"
        name="username"
        placeholder="username"
        autocomplete="username"
        required
      />
      <input
        class="input-field"
        type="password"
        id="password"
        name="password"
        placeholder="password"
        autocomplete="current-password"
        required
      />
      <button class="btn-login" type="submit">LOGIN</button>
    </form>

  </main>

  <script src="admin.js"></script>

</body>
