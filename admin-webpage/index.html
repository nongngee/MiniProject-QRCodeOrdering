<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ลาวอ้อยต้อย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <main class="screen">

    <div class="logo-wrap">
        <img src="image/lot_logo.png" alt="">
    </div>

    <div class="brand-th">ลาวอ้อยต้อย</div>
    <div class="brand-en">E-SAN RESTAURANT</div>

    <div class="login-heading">LOG IN</div>
    <div class="login-sub">TO OPEN</div>

    <form class="form" onsubmit="handleLogin(event)">
      <input
        class="input-field"
        type="text"
        id="username"
        name="username"
        placeholder="username"
        autocomplete="username"
        required
      />
      <input
        class="input-field"
        type="password"
        id="password"
        name="password"
        placeholder="password"
        autocomplete="current-password"
        required
      />
      <button class="btn-login" type="submit">LOGIN</button>
    </form>

  </main>

  <script src="admin.js"></script>

</body>
